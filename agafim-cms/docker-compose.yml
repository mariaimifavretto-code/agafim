services:
  payload:
    image: node:18-alpine
    ports:
      - '3001:3001'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev -- -p 3001 -H 0.0.0.0"
    depends_on:
      # - mongo
      - postgres
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://payload:uma_senha_muito_forte_123@postgres:5432/agafim_cms
      - HOST=0.0.0.0
      - PORT=3001

  postgres:
    restart: always
    image: postgres:latest
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  # data:
  pgdata:
  node_modules:
