services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:4321"
    depends_on:
      - payload-cms
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - SITE_URL=http://localhost:4321
      - PAYLOAD_URL=http://payload-cms:3001
    networks:
      - agafim-network

  payload-cms:
    build:
      context: ./agafim-cms
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_media:/app/public/media
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - PAYLOAD_PUBLIC_SERVER_URL=http://localhost:3001
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-agafimcms_super_secret_key_2024_payload_64_chars_secure_jwt_encryption_change_in_production}
    networks:
      - agafim-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uma_senha_muito_forte_123}
      POSTGRES_DB: ${POSTGRES_DB:-agafim_cms}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payload} -d ${POSTGRES_DB:-agafim_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agafim-network

volumes:
  backend_media:
  postgres_data:


networks:
  agafim-network:
    driver: bridge